<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./../assets/styles/footer.css" />
    <link rel="stylesheet" href="./../assets/styles/navbar.css" />
  </head>

</head>
<body>
    <nav id="mainNavbar" class="navbar navbar-expand-lg custom-navbar sticky-top border">
        <div class="container">
            <a class="navbar-brand" href="#">
                <div>
                    Generation <span class="brand-green">Express</span>
                </div>      
                <span class="brand-tagline">Logística que conecta el mundo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" 
                aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Rastreo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/pages/nosotros.html">Nosotros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contacto.html">Contacto</a>
                    </li>
                </ul>
                <button class="btn btn-ingresar">
                    Ingresar
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-6">
                <section id="formulario">
                    <h2>Formulario</h2>
                      <!--inicio formulario de prueba -->
                    <form>
                        <div class="mb-3">
                          

                            <label for="nombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre">
                            <label for="contacto" class="form-label">Numero Contacto</label>
                            <input type="number" class="form-control" id="contacto">
                            <label for="direccion-inicio" class="form-label">Direccion De Recoleccion</label>
                            <input type="text" class="form-control" id="direccion-inicio">
                            <label for="direccion-final" class="form-label">Direccion De Entrega</label>
                            <input type="text" class="form-control" id="direccion-final">
                            <label for="peso" class="form-label">Peso Kg</label>
                            <input type="number" class="form-control" id="peso">
                            
                            <label for="tipo-envio">Tipo De Envio:</label>
                            <p></p>
                            <select id="tipo-envio" name="tipo-envio">
                                <option value="co">Normal</option>
                                <option value="mx">Premium</option>
                                <option value="es">Economico</option>
                            </select>
                            
                            
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Registrar</button>
                    </form>
                    <!-- fin formulario de prueba -->
                </section>
            </div>
            <div class="col-md-6">
                <section id="solicitudes">
                    <!-- inicio tabla solicitudes -->

                    <h2>Solicitudes</h2>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tipo De Envio</th>
                                <th>Cliente</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>Peso</th>                                
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
