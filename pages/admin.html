<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./../assets/styles/admin.css">

    <link rel="stylesheet" href="./../assets/styles/footer.css" />
    <link rel="stylesheet" href="./../assets/styles/navbar.css" />
  </head>

</head>
<body>
    <nav id="mainNavbar" class="navbar navbar-expand-lg custom-navbar sticky-top border">
        <div class="container">
            <a class="navbar-brand" href="#">
                <div>
                    Generation <span class="brand-green">Express</span>
                </div>      
                <span class="brand-tagline">Logística que conecta el mundo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" 
                aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Rastreo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/pages/nosotros.html">Nosotros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contacto.html">Contacto</a>
                    </li>
                </ul>
                <button class="btn btn-ingresar">
                    Ingresar
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-6">
                <section id="formulario">
                    <h2>Formulario</h2>
                    <div class="mx-auto">
                    <div class="contact-form-container">
                        <form
                            class="contact-form"
                            method="POST"
                        >
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <select
                                        name="type_shipping"
                                        id="type_shipping"
                                        class="form-select contact-input"
                                        required
                                    >
                                        <option value="">Tipo de envío</option>
                                        <option value="Nacional">Nacional</option>
                                        <option value="Internacional">Internacional</option>
                                        <option value="Express">Express</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <input
                                        type="number"
                                        step="0.01"
                                        id="weight"
                                        name="weight"
                                        class="form-control contact-input"
                                        placeholder="Peso (kg)"
                                        required
                                    />
                                </div>

                                <div class="col-12">
                                    <input
                                        type="text"
                                        name="origin"
                                        id="origin"
                                        class="form-control contact-input"
                                        placeholder="Sitio de origen"
                                        required
                                    />
                                </div>

                                <div class="col-12">
                                    <input
                                        type="text"
                                        name="destination"
                                        id="destination"
                                        class="form-control contact-input"
                                        placeholder="Destino"
                                        required
                                    />
                                </div>

                                <div class="col-md-6">
                                    <input
                                        type="text"
                                        name="contact_name"
                                        id="contact_name"
                                        class="form-control contact-input"
                                        placeholder="Nombre de contacto"
                                        required
                                    />
                                </div>

                                <div class="col-md-6">
                                    <input
                                        type="tel"
                                        name="phone"
                                        id="phone"
                                        class="form-control contact-input"
                                        placeholder="Teléfono"
                                        required
                                    />
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn contact-btn">
                                        Solicitar Cotización
                                    </button>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <section id="solicitudes">
                    <h2>Solicitudes</h2>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tipo Envio</th>
                                <th>Peso</th>
                                <th>Origen</th>
                                <th>Destino</th>
                                <th>Cliente</th>
                                <th>Telefono</th>
                                <th>Precio</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-tabla">
                        </tbody>
                    </table>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/dashS.js"></script>
</body>
</html>
