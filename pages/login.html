<body>
    <nav id="mainNavbar" class="navbar navbar-expand-lg custom-navbar sticky-top border">

            <a class="navbar-brand" href="#">
                <div>
                    Generation <span class="brand-green">Express</span>
                </div>

            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" 
                aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">

            </button>
            <div class="collapse navbar-collapse" id="menu">

                </ul>
                <button class="btn btn-ingresar">
                    Ingresar
                </button>
            </div>
        </div>
    </nav>
    
    <div class="form-container">
        <h2>Crear Cuenta</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ingrese su nombre completo" required>
                <div class="error-message" id="errorNombre"></div>
            </div>

            <div class="form-group">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" required>
                <div class="error-message" id="errorCorreo"></div>
            </div>

            <div class="form-group">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="tel" id="telefono" class="form-control" placeholder="Ingrese su número telefónico" required>
                <div class="error-message" id="errorTelefono"></div>
            </div>

            <button type="submit" class="btn-login">Crear Cuenta</button>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
            <div class="success-message" id="successMessage">¡Datos guardados correctamente!</div>
        </form>
    </div>
     <footer>

        <div class="container">
          <div class="row align-items-center gy-4">
            <div class="col-12 col-lg-4 text-center text-lg-start">

                  src="./assets/logo.png"

                />

                    Logística que conecta el mundo
                  </small>
                </div>
              </div>

                © 2026 Generation Express.<br />
                Todos los derechos reservados.

            </div>

            <div class="col-12 col-lg-5">
              <div
                class="footer-links d-flex flex-column flex-md-row justify-content-center gap-3 gap-md-4"
              >
                <a href="#" class="text-decoration-none text-dark">
                  <i class="bi bi-shield-check me-1"></i>
                  Privacidad

                <a href="#" class="text-decoration-none text-dark">

            <div class="col-12 col-lg-3">

                class="d-flex justify-content-center justify-content-lg-end gap-3"
              >
                <a href="#" class="social-circle">
                  <i class="bi bi-linkedin"></i>
                </a>

                <a href="#" class="social-circle">
                  <i class="bi bi-twitter-x"></i>
                </a>

                <a href="#" class="social-circle">
                  <i class="bi bi-facebook"></i>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-gradient"></div>
      </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
